<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>GitHub Issues Tracker</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Tailwind CSS + daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Outfit fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="shadow-lg">
      <nav
        class="w-11/12 mx-auto py-3 flex flex-col space-y-2 md:flex-row justify-between items-center gap-2"
      >
        <!-- Logo and title -->
        <div class="flex items-center justify-center gap-3">
          <img
            src="./assets/github-logo.png"
            alt="Github Logo"
            class="h-8 w-8"
          />
          <h2 class="text-2xl font-semibold whitespace-nowrap">
            GitHub Issues Tracker
          </h2>
        </div>

        <!-- Search and button section -->
        <div class="flex items-center gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              type="search"
              required
              placeholder="Search..."
              class="w-24 sm:w-auto"
            />
          </label>

          <button class="btn btn-primary text-white">+ New Issue</button>
        </div>
      </nav>
    </header>
  </body>
</html>
